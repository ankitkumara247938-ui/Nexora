<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Movies</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

header{
background:#e50914;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.search{
text-align:center;
margin:20px;
}

input{
padding:10px;
width:80%;
max-width:400px;
border:none;
border-radius:5px;
}

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#222;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
text-align:center;
padding:10px;
margin:0;
}

button{
width:100%;
padding:10px;
background:#e50914;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}
</style>

</head>
<body>

<header>NEXORA MOVIES</header>

<div class="search">
<input type="text" placeholder="Search Movies...">
</div>

<div class="movies">

<div class="card">
<img src="https://via.placeholder.com/300x450.png?text=Movie+1">
<h3>Movie 1</h3>
<button>Watch Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x450.png?text=Movie+2">
<h3>Movie 2</h3>
<button>Watch Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x450.png?text=Movie+3">
<h3>Movie 3</h3>
<button>Watch Now</button>
</div>

</div>

</body>
</html>
